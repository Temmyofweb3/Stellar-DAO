name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Soroban contracts pinned to soroban-sdk =21.7.7. Contract
      # dev-deps do NOT enable the `testutils` feature — see
      # docs/soroban-testutils-issue.md for the E0277 rationale and
      # the test-removal reasoning. The three cargo steps below
      # gate CI:
      - name: Cargo check (Soroban contracts)
        working-directory: contracts
        run: cargo check --workspace --lib --bins

      - name: Cargo test compile (Soroban contracts)
        working-directory: contracts
        run: cargo test --workspace --no-run

      - name: Build (WASM — Soroban contracts)
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Build (Node bundles)
        run: pnpm build
