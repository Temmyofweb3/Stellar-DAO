name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      TURBO_TOKEN: ${{ secrets.TURBO_TOKEN }}
      TURBO_TEAM: ${{ vars.TURBO_TEAM }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20.11.0
          cache: pnpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: contracts -> target

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: pnpm-store-

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      # Soroban contracts are pinned to `soroban-sdk = =21.7.7` (the
      # most recent 21.x release that matches the pre-22 API surface
      # the contract source uses). The `testutils` feature is
      # intentionally NOT enabled in any contract's [dev-dependencies]
      # because `soroban-env-host` 21.2.1 has an unfixable E0277 in
      # its `with_test_prng` helper (testutils' `ed25519-dalek` 3.0.0
      # re-exports a `CryptoRng` from `rand_core` 0.10.x, incompatible
      # with the one `ChaCha20Rng` implements). The contracts' in-process
      # unit tests were removed; integration tests against a deployed
      # Soroban host will replace them in a follow-up. See
      # `contracts/Cargo.toml` for the full rationale. The three crates
      # below are gating CI:
      #   cargo check enforces the SDK absorbs the source unchanged
      #   cargo test --no-run compiles the (now-empty) test surface
      #     without triggering the testutils path
      #   cargo build --target wasm32-unknown-unknown --release
      #     enforces the WASM artefact ships from current source
      - name: Cargo check (Soroban contracts)
        working-directory: contracts
        run: cargo check --workspace --lib --bins

      - name: Cargo test compile (Soroban contracts)
        working-directory: contracts
        run: cargo test --workspace --no-run

      - name: Build (WASM — Soroban contracts)
        working-directory: contracts
        run: cargo build --target wasm32-unknown-unknown --release --workspace

      - name: Build (Node bundles)
        run: pnpm build
